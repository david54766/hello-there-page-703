name: CallRecover
options:
  bundleIdPrefix: ai.easyfill
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
configs:
  Debug: debug
  Release: release
targets:
  CallRecover:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - CallRecover
    configFiles:
      Debug: Config/CallRecover.xcconfig
      Release: Config/CallRecover.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.easyfill.callrecover
        INFOPLIST_FILE: CallRecover/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

